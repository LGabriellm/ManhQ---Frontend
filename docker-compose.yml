services:
  frontend:
    container_name: manhq-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://app.manhq.com.br}
    expose:
      - "3001"
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - API_URL=${API_URL:-https://api.manhq.com.br}
    restart: unless-stopped
    networks:
      - manhq_network
    labels:
      # Traefik Configuration (Hostinger Docker Manager compatible)
      - "traefik.enable=true"
      - "traefik.http.routers.manhq-frontend.rule=Host(`${TRAEFIK_HOST:-app.manhq.com.br}`)"
      - "traefik.http.routers.manhq-frontend.entrypoints=websecure"
      - "traefik.http.routers.manhq-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.manhq-frontend.loadbalancer.server.port=3001"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/',{redirect:'manual'}).then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

networks:
  manhq_network:
    driver: bridge
    name: manhq_network
    external: true
