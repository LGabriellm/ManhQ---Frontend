name: Deploy Frontend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 12m
          script: |
            set -e
            REPO_DIR=~/containers_docker/manhq_frontend
            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"

            echo "=== [1/6] Preparando diretório ==="
            # Cria o diretório pai se não existir
            mkdir -p ~/containers_docker

            # Clona o repositório se não existir
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "📦 Clonando repositório pela primeira vez..."
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            echo "=== [2/6] Atualizando código ==="
            echo "🔄 Atualizando código..."
            git fetch origin main
            git reset --hard origin/main

            echo "=== [3/6] Verificando .env ==="
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "⚠️  .env criado a partir do .env.example — configure as variáveis!"
              echo "   Execute: nano $REPO_DIR/.env"
              exit 1
            fi

            echo "=== [4/6] Build do container ==="
            echo "🐳 Construindo imagem..."
            docker compose build --no-cache frontend

            echo "=== [5/6] Iniciando container ==="
            echo "🚀 Subindo containers..."
            docker compose up -d

            echo "=== [6/6] Health check ==="
            echo "⏳ Aguardando frontend ficar saudável..."
            for i in $(seq 1 12); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' manhq-frontend 2>/dev/null || echo "not_found")
              if [ "$HEALTH" = "healthy" ]; then
                echo "✅ Deploy concluído com sucesso!"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "❌ Frontend não ficou healthy em 60s. Verificando logs..."
                docker compose logs --tail=30 frontend
                exit 1
              fi
              echo "  Tentativa $i/12 — status: $HEALTH"
              sleep 5
            done

            echo "=== Limpeza ==="
            docker image prune -f
