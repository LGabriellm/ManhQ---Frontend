services:
  frontend:
    container_name: manhq-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.manhq.com.br}
    expose:
      - "3001"
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    networks:
      - manhq-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/',{redirect:'manual'}).then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

networks:
  manhq-net:
    external: true
    name: manhq_backend_manhq-net
