services:
  frontend:
    container_name: manhq-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    networks:
      - manhq-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

networks:
  manhq-net:
    external: true
    name: manhq_backend_manhq-net
